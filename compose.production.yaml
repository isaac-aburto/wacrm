services:
  void-crm:
    container_name: void-crm
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:?required}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:?required}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://www.voidx.cl}
        NEXT_PUBLIC_APP_LOCALE: ${NEXT_PUBLIC_APP_LOCALE:-es}
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    init: true
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    volumes:
      - void-crm-cache:/app/.next/cache
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--spider',
          'http://127.0.0.1:3000/api/health',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  void-crm-cache:
