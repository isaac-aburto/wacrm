# Included inside the existing HTTPS server block for voidx.cl/www.voidx.cl.
# The existing `location /` remains unchanged and continues serving the
# marketing site from /var/www/agentx-web.

location ^~ /_next/ {
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/snippets/void-crm-proxy.conf;
}

location ^~ /api/ {
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/snippets/void-crm-proxy.conf;
    client_max_body_size 50M;
}

location ^~ /join/ {
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/snippets/void-crm-proxy.conf;
}

location ^~ /brand/ {
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/snippets/void-crm-proxy.conf;
}

location ^~ /opus/ {
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/snippets/void-crm-proxy.conf;
}

location = /inbox-doodle.svg {
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/snippets/void-crm-proxy.conf;
}

location = /icon {
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/snippets/void-crm-proxy.conf;
}

location = /signup {
    return 404;
}

location = /signup/ {
    return 404;
}

location ~ ^/(?:login|forgot-password)/?$ {
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/snippets/void-crm-proxy.conf;
}

location ~ ^/(?:dashboard|inbox|contacts|pipelines|broadcasts|automations|agents|flows|notifications|settings)(?:/|$) {
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/snippets/void-crm-proxy.conf;
}
